name: Specmatic Enterprise Jar Tests
run-name: Specmatic Enterprise Jar Tests (${{ github.event.client_payload.enterprise_configuration || inputs.enterprise_configuration || 'ubuntu-latest' }})

on:
  workflow_dispatch:
    inputs:
      jar_url:
        description: Optional URL of the jar produced by specmatic/enterprise. If omitted, enterprise_version resolves the jar.
        required: false
        type: string
      enterprise_repository:
        description: Enterprise repository to update
        required: true
        default: specmatic/enterprise
        type: string
      enterprise_sha:
        description: Enterprise commit SHA to report back against
        required: true
        type: string
      enterprise_run_id:
        description: Enterprise workflow run id
        required: false
        type: string
      enterprise_run_attempt:
        description: Enterprise workflow run attempt
        required: false
        type: string
      enterprise_version:
        description: Enterprise version to test, for example 1.12.1-SNAPSHOT
        required: true
        type: string
      test_executor_path:
        description: Optional test executor fixture path for manual runs
        required: false
        type: string
      enterprise_configuration:
        description: Runner OS/configuration to use for the orchestrated tests
        required: false
        default: ubuntu-latest
        type: choice
        options:
          - ubuntu-latest
          - windows-latest
      run_parallel:
        description: Dispatch target repository workflows in parallel and wait for them
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types:
      - specmatic-enterprise-jar-ready

permissions:
  contents: read

jobs:
  run-orchestrator:
    name: run-orchestrator (${{ github.event.client_payload.enterprise_configuration || inputs.enterprise_configuration || 'ubuntu-latest' }})
    runs-on: ${{ github.event.client_payload.enterprise_configuration || inputs.enterprise_configuration || 'ubuntu-latest' }}
    defaults:
      run:
        shell: bash
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
      SPECMATIC_LICENSE_KEY: ${{ secrets.SPECMATIC_LICENSE_KEY }}

      ORCHESTRATOR_DISABLE_VISUAL: "false"
      ENABLE_VISUAL: "true"
    steps:
      - name: Checkout orchestrator
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Specmatic License key
        run: |
          echo "Write specmatic license key to file"
          mkdir -p ~/.specmatic
          echo "${{ secrets.SPECMATIC_LICENSE_KEY }}" > ~/.specmatic/specmatic-license.txt

      - name: Debug Applitools
        run: |
          echo "Applitools key present ${APPLITOOLS_API_KEY:+YES}"
          echo "ENABLE_VISUAL=$ENABLE_VISUAL"
          echo "ORCHESTRATOR_DISABLE_VISUAL=$ORCHESTRATOR_DISABLE_VISUAL"

      - name: Normalize workflow inputs
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text(encoding="utf-8"))
          if os.environ["GITHUB_EVENT_NAME"] == "repository_dispatch":
              payload = event.get("client_payload", {})
          else:
              payload = event.get("inputs", {})

          print("Incoming workflow event:")
          print(json.dumps(event, indent=2, sort_keys=True))
          print("Normalized payload:")
          print(json.dumps(payload, indent=2, sort_keys=True))

          def pick(*names: str, default: str = "") -> str:
              for name in names:
                  value = payload.get(name)
                  if value not in (None, ""):
                      return str(value)
              return default

          options = payload.get("orchestrator_options")
          if not isinstance(options, dict):
              options = {}

          def pick_option(name: str, default: str = "") -> str:
              value = options.get(name)
              if value not in (None, ""):
                  return str(value)
              return pick(name, default=default)

          values = {
              "SPECMATIC_JAR_URL": pick("jar_url"),
              "ENTERPRISE_REPOSITORY": pick("enterprise_repository", default="specmatic/enterprise"),
              "ENTERPRISE_SHA": pick("enterprise_sha"),
              "ENTERPRISE_RUN_ID": pick("enterprise_run_id"),
              "ENTERPRISE_RUN_ATTEMPT": pick("enterprise_run_attempt"),
              "ENTERPRISE_STATUS_CONTEXT": pick("enterprise_status_context"),
              "ENTERPRISE_STATUS_TARGET_URL": pick("enterprise_status_target_url"),
              "ENTERPRISE_VERSION": pick("enterprise_version"),
              "ENTERPRISE_CONFIGURATION": pick("enterprise_configuration", default="ubuntu-latest"),
              "ORCHESTRATOR_TEST_EXECUTOR_PATH": pick("test_executor_path"),
              "RUN_PARALLEL": pick_option("run_parallel", default="false").lower(),
              "SPEC_OUTPUTS_DIR": "outputs",
              "SPEC_CONSOLIDATED_DIR": "consolidated_output",
              "SPECMATIC_SUMMARY_JSON": "outputs/orchestration-summary.json",
              "SPECMATIC_SUMMARY_HTML": "outputs/index.html",
            }

          for key, value in values.items():
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
                  handle.write(f"{key}={value}\n")
          PY

      - name: Validate required inputs
        run: |
          set -euo pipefail
          : "${ENTERPRISE_REPOSITORY:?ENTERPRISE_REPOSITORY is required}"
          : "${ENTERPRISE_SHA:?ENTERPRISE_SHA is required}"
          : "${ENTERPRISE_VERSION:?ENTERPRISE_VERSION is required}"
          case "${ENTERPRISE_CONFIGURATION}" in
            ubuntu-latest|windows-latest) ;;
            *)
              echo "Unsupported ENTERPRISE_CONFIGURATION: ${ENTERPRISE_CONFIGURATION}"
              exit 1
              ;;
          esac
          echo "Running orchestrated tests on ${ENTERPRISE_CONFIGURATION}"

      - name: Download the Enterprise jar
        if: env.SPECMATIC_JAR_URL != ''
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/specmatic"
          curl -L --fail --retry 3 --retry-delay 2 "$SPECMATIC_JAR_URL" -o "$RUNNER_TEMP/specmatic/enterprise.jar"
          echo "SPECMATIC_JAR_PATH=$RUNNER_TEMP/specmatic/enterprise.jar" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Specmatic tests
        id: specmatic-tests
        env:
          ORCHESTRATOR_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ORCHESTRATOR_RUN_ID: ${{ github.run_id }}
          ORCHESTRATOR_RUN_ATTEMPT: ${{ github.run_attempt }}
          ORCHESTRATOR_GITHUB_TOKEN: ${{ secrets.SPECMATIC_GITHUB_TOKEN }}
        run: |
          set +e
          mkdir -p "$SPEC_OUTPUTS_DIR" "$SPEC_CONSOLIDATED_DIR"
          export SPECMATIC_JAR_PATH
          export SPECMATIC_JAR_URL
          export ENTERPRISE_VERSION
          export ORCHESTRATOR_TEST_EXECUTOR_PATH
          export SPEC_OUTPUTS_DIR
          export RUN_PARALLEL
          extra_args=()
          if [ "${RUN_PARALLEL}" = "true" ]; then
            extra_args+=(--run-parallel)
          fi
          python scripts/run-orchestration-test.py \
            --config "${ORCHESTRATOR_TEST_EXECUTOR_PATH:-}" \
            --outputs-dir "$SPEC_OUTPUTS_DIR" \
            --specmatic-jar-url "$SPECMATIC_JAR_URL" \
            --specmatic-jar-path "$SPECMATIC_JAR_PATH" \
            --enterprise-version "$ENTERPRISE_VERSION" \
            "${extra_args[@]}"
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Send callback to Enterprise
        if: always()
        env:
          ENTERPRISE_CALLBACK_TOKEN: ${{ secrets.SPECMATIC_GITHUB_TOKEN }}
          ORCHESTRATOR_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ORCHESTRATOR_RUN_ID: ${{ github.run_id }}
          ORCHESTRATOR_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          python scripts/bridge_to_enterprise.py

      - name: Fail workflow if tests failed
        if: always()
        run: |
          test "${{ steps.specmatic-tests.outputs.exit_code }}" = "0"

      - name: Verify summary files
        if: always()
        run: |
          set -euo pipefail
          test -f "$SPECMATIC_SUMMARY_JSON"
          test -f "$SPECMATIC_SUMMARY_HTML"

      - name: Archive outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: specmatic-outputs
          path: |
            outputs/**
            consolidated_output/**
