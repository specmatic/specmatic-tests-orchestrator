name: Specmatic Enterprise Jar Tests

on:
  workflow_dispatch:
    inputs:
      jar_url:
        description: URL of the jar produced by specmatic/enterprise
        required: true
        type: string
      enterprise_repository:
        description: Enterprise repository to update
        required: true
        default: specmatic/enterprise
        type: string
      enterprise_sha:
        description: Enterprise commit SHA to report back against
        required: true
        type: string
      enterprise_run_id:
        description: Enterprise workflow run id
        required: false
        type: string
      enterprise_run_attempt:
        description: Enterprise workflow run attempt
        required: false
        type: string
      test_command:
        description: Shell command that runs the Python orchestration code
        required: false
        default: python3 scripts/run-orchestration-test.py
        type: string
  repository_dispatch:
    types:
      - specmatic-enterprise-jar-ready

permissions:
  contents: read

jobs:
  run-orchestrator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout orchestrator
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Normalize workflow inputs
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text(encoding="utf-8"))
          if os.environ["GITHUB_EVENT_NAME"] == "repository_dispatch":
              payload = event.get("client_payload", {})
          else:
              payload = event.get("inputs", {})

          def pick(*names: str, default: str = "") -> str:
              for name in names:
                  value = payload.get(name)
                  if value not in (None, ""):
                      return str(value)
              return default

          values = {
              "SPECMATIC_JAR_URL": pick("jar_url"),
              "SPECMATIC_TEST_COMMAND": pick("test_command", default="python3 scripts/run-orchestration-test.py"),
              "ENTERPRISE_REPOSITORY": pick("enterprise_repository", default="specmatic/enterprise"),
              "ENTERPRISE_SHA": pick("enterprise_sha"),
              "ENTERPRISE_RUN_ID": pick("enterprise_run_id"),
              "ENTERPRISE_RUN_ATTEMPT": pick("enterprise_run_attempt"),
              "SPEC_OUTPUTS_DIR": "outputs",
              "SPEC_CONSOLIDATED_DIR": "consolidated_output",
              "SPECMATIC_SUMMARY_JSON": "consolidated_output/summary.json",
              "SPECMATIC_SUMMARY_HTML": "consolidated_output/summary.html",
            }

          for key, value in values.items():
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
                  handle.write(f"{key}={value}\n")
          PY

      - name: Validate required inputs
        run: |
          set -euo pipefail
          : "${SPECMATIC_JAR_URL:?SPECMATIC_JAR_URL is required}"
          : "${ENTERPRISE_REPOSITORY:?ENTERPRISE_REPOSITORY is required}"
          : "${ENTERPRISE_SHA:?ENTERPRISE_SHA is required}"

      - name: Download the Enterprise jar
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/specmatic"
          curl -L --fail --retry 3 --retry-delay 2 "$SPECMATIC_JAR_URL" -o "$RUNNER_TEMP/specmatic/enterprise.jar"
          echo "SPECMATIC_JAR_PATH=$RUNNER_TEMP/specmatic/enterprise.jar" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Python orchestration
        run: |
          set -euo pipefail
          mkdir -p "$SPEC_OUTPUTS_DIR" "$SPEC_CONSOLIDATED_DIR"
          export SPECMATIC_JAR_PATH
          export SPECMATIC_JAR_URL
          export SPECMATIC_SUMMARY_JSON
          export SPECMATIC_SUMMARY_HTML
          export ENTERPRISE_REPOSITORY
          export ENTERPRISE_SHA
          export ENTERPRISE_RUN_ID
          export ENTERPRISE_RUN_ATTEMPT
          export SPEC_OUTPUTS_DIR
          export SPEC_CONSOLIDATED_DIR
          bash -lc "$SPECMATIC_TEST_COMMAND"

      - name: Verify summary files
        if: always()
        run: |
          set -euo pipefail
          test -f "$SPECMATIC_SUMMARY_JSON"
          test -f "$SPECMATIC_SUMMARY_HTML"

      - name: Archive outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-outputs
          path: |
            outputs/**
            consolidated_output/**

      - name: Callback Enterprise
        if: always()
        env:
          ENTERPRISE_CALLBACK_TOKEN: ${{ secrets.ENTERPRISE_CALLBACK_TOKEN }}
          ORCHESTRATOR_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ORCHESTRATOR_RUN_ID: ${{ github.run_id }}
          ORCHESTRATOR_RUN_ATTEMPT: ${{ github.run_attempt }}
          ORCHESTRATOR_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${ENTERPRISE_CALLBACK_TOKEN:-}" ]; then
            echo "ENTERPRISE_CALLBACK_TOKEN is not set; skipping Enterprise callback."
            exit 0
          fi

          python3 scripts/bridge_to_enterprise.py
